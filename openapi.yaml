openapi: "3.1.0"
info:
  title: SinclearChat API
  description: |
    PHP-basierte Chat-API für das SinclearChat-Projekt.

    Die Kommunikation erfolgt ausschließlich HMAC-gesichert via Shared Secret.
    Jeder Request (ausser /api/health) benötigt die Header `X-Hub-Timestamp`
    und `X-Hub-Signature`.

    ## HMAC-Signatur
    - `payload = "{timestamp}.{method}.{uri}.{request_body}"`
    - `X-Hub-Signature = hex(HMAC-SHA256(secret, payload))`
    - Timestamp muss innerhalb von 5 Minuten der Serverzeit liegen.
    - Für GET-Requests ist `request_body` ein leerer String `""`.

    ## Chat-Typen
    - `direct`: Chat zwischen zwei Nutzern. `chat_id` ist die User-ID des
      Gesprächspartners.
    - `group`: Chat in einem Raum. `chat_id` ist die Chatraum-ID aus der
      `chat_rooms`-Tabelle.

    ## Nachrichten-Lebensdauer
    - Gruppen-Chats: TTL wird pro Raum in `chat_rooms.ttl_days` konfiguriert.
    - Direktnachrichten: TTL aus `DEFAULT_TTL_DAYS` (Default: 30 Tage).
    - Bereinigung erfolgt automatisch via MySQL Event Scheduler (einmal täglich).
  version: "1.0.0"
  contact:
    name: SinclearChat
servers:
  - url: https://chat-api.example.com
    description: Produktiv-Server
paths:
  /api/health:
    get:
      operationId: healthCheck
      summary: Health-Check
      description: Öffentlicher Endpoint (keine HMAC-Signatur nötig).
      tags:
        - System
      responses:
        "200":
          description: Server ist betriebsbereit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/messages:
    post:
      operationId: pushMessage
      summary: Nachricht senden
      description: |
        Erstellt eine neue Chat-Nachricht.
        Die Nachricht wird mit einer UUID v7 als ID und einem Server-Zeitstempel
        gespeichert.
      tags:
        - Messages
      security:
        - HMACAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushRequest"
      responses:
        "201":
          description: Nachricht erfolgreich erstellt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushResponse"
        "400":
          description: Ungültige Anfrage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Nicht autorisiert (HMAC-Signatur fehlt/ungültig)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Keine Mitgliedschaft im Gruppen-Chat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: pullMessages
      summary: Nachrichten abrufen
      description: |
        Ruft Chat-Nachrichten abwahlweise für Direktnachrichten
        (`chat_type=direct`) oder Gruppen-Chats (`chat_type=group`).

        ## Paginierung
        - `before`: ISO-8601-Timestamp – liefert Nachrichten **älter** als
          dieser Zeitpunkt (Scroll-nach-oben / Load-More).
        - `after`: ISO-8601-Timestamp – liefert Nachrichten **neuer** als
          dieser Zeitpunkt (Polling für neue Nachrichten).
        - `limit`: Maximale Anzahl Nachrichten (Default 50, Max 200).
        - Die Response enthält `pagination.has_more` und `pagination.next_before`
          für die nächste Page.
      tags:
        - Messages
      security:
        - HMACAuth: []
      parameters:
        - name: chat_type
          in: query
          required: true
          schema:
            type: string
            enum:
              - direct
              - group
          description: Art der abzurufenden Nachrichten
        - name: user_id
          in: query
          required: true
          schema:
            type: string
          description: ID des abfragenden Nutzers
          example: "auth0|abc123"
        - name: chat_partner_id
          in: query
          required: false
          schema:
            type: string
          description: "Nur bei `chat_type=direct`: User-ID des Gesprächspartners"
        - name: chat_id
          in: query
          required: false
          schema:
            type: string
          description: "Nur bei `chat_type=group`: Chatraum-ID"
        - name: after
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: >
            ISO-8601-Timestamp. Liefert nur Nachrichten, die **nach** diesem
            Zeitpunkt erstellt wurden (für Polling neue Nachrichten).
          example: "2026-05-30T12:00:00.000000Z"
        - name: before
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: >
            ISO-8601-Timestamp. Liefert nur Nachrichten, die **vor** diesem
            Zeitpunkt erstellt wurden (für ältere Nachrichten laden).
          example: "2026-05-30T12:00:00.000000Z"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Maximale Anzahl Nachrichten pro Page
      responses:
        "200":
          description: Nachrichten erfolgreich abgerufen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullResponse"
        "400":
          description: Ungültige Parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Nicht autorisiert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/rooms:
    get:
      operationId: listRooms
      summary: Chaträume auflisten
      description: Gibt alle verfügbaren Chaträume inklusive TTL-Konfiguration zurück.
      tags:
        - Rooms
      security:
        - HMACAuth: []
      responses:
        "200":
          description: Liste aller Chaträume
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomListResponse"
  /api/rooms/{id}:
    get:
      operationId: getRoom
      summary: Chatraum-Details abrufen
      description: Gibt die Details eines einzelnen Chatraums zurück.
      tags:
        - Rooms
      security:
        - HMACAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Chatraum-ID
      responses:
        "200":
          description: Chatraum-Details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoomDetailResponse"
        "404":
          description: Chatraum nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/rooms/{id}/members:
    get:
      operationId: getRoomMembers
      summary: Mitglieder eines Chatraums abrufen
      description: Gibt alle Mitglieder-IDs eines Chatraums zurück.
      tags:
        - Rooms
      security:
        - HMACAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Chatraum-ID
      responses:
        "200":
          description: Liste der Mitglieder-IDs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberListResponse"
        "400":
          description: Ungültige Anfrage
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Chatraum nicht gefunden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  securitySchemes:
    HMACAuth:
      type: apiKey
      in: header
      name: X-Hub-Signature
      description: >
        HMAC-SHA256 Signatur des Requests.
        Erzeugung: `hex(HMAC-SHA256(secret, "{timestamp}.{method}.{uri}.{body}"))`.
        Zusätzlich ist der Header `X-Hub-Timestamp` (Unix-Timestamp in
        Sekunden) erforderlich.
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: "ok"
        database:
          type: string
          description: "Verbindungsstatus zur MySQL-Datenbank"
          example: "connected"
        timestamp:
          type: string
          format: date-time
          example: "2026-05-30T12:00:00Z"
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Fehlermeldung
          example: "Invalid or missing HMAC signature"
    PushRequest:
      type: object
      required:
        - user_id
        - chat_id
        - chat_type
        - body
      properties:
        user_id:
          type: string
          description: ID des sendenden Nutzers (aus Next.js Auth)
          example: "auth0|abc123"
        chat_id:
          type: string
          description: >
            Bei `direct`: User-ID des Gesprächspartners.
            Bei `group`: ID des Chatraums.
          example: "auth0|def456"
        chat_type:
          type: string
          enum:
            - direct
            - group
          description: Art der Nachricht
        body:
          type: string
          description: Nachrichteninhalt
          example: "Hallo, wie geht's?"
        attachment_type:
          type: string
          nullable: true
          description: "Typ des Anhangs (z.B. 'image', 'link')"
          example: "image"
        attachment_body:
          type: string
          nullable: true
          description: "Inhalt des Anhangs (Base64-Bild, JSON oder URL)"
          example: "data:image/avif;base64,..."
    MessageObject:
      type: object
      properties:
        id:
          type: string
          format: hex
          description: UUID v7 (32 Zeichen hex)
          example: "018f8c9a7b3c7a8e9f0a1b2c3d4e5f60"
        user_id:
          type: string
          example: "auth0|abc123"
        chat_id:
          type: string
          example: "auth0|def456"
        chat_type:
          type: string
          enum:
            - direct
            - group
        body:
          type: string
          example: "Hallo, wie geht's?"
        attachment_type:
          type: string
          nullable: true
          example: "image"
        attachment_body:
          type: string
          nullable: true
          example: "data:image/avif;base64,..."
        created_at:
          type: string
          format: date-time
          example: "2026-05-30T12:00:00.000000Z"
    PaginationInfo:
      type: object
      properties:
        has_more:
          type: boolean
          description: "Gibt es weitere Nachrichten (für Load-More)?"
        next_before:
          type: string
          format: date-time
          nullable: true
          description: >
            Timestamp der ältesten Nachricht dieser Page.
            Diesen Wert als `before`-Parameter für die nächste Page verwenden.
          example: "2026-05-30T11:59:00.000000Z"
    PushResponse:
      type: object
      properties:
        message:
          $ref: "#/components/schemas/MessageObject"
    PullResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MessageObject"
        pagination:
          $ref: "#/components/schemas/PaginationInfo"
    RoomObject:
      type: object
      properties:
        id:
          type: string
          example: "general"
        name:
          type: string
          example: "Allgemein"
        description:
          type: string
          nullable: true
          example: "Allgemeiner Chatraum"
        ttl_days:
          type: integer
          description: Anzahl Tage, bis Nachrichten automatisch gelöscht werden
          example: 30
        created_at:
          type: string
          description: "MySQL TIMESTAMP (kein ISO-8601, da roh aus der Datenbank)"
          example: "2026-05-30 12:00:00"
        updated_at:
          type: string
          description: "MySQL TIMESTAMP (kein ISO-8601, da roh aus der Datenbank)"
          example: "2026-05-30 12:00:00"
    RoomListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/RoomObject"
    RoomDetailResponse:
      type: object
      properties:
        data:
          $ref: "#/components/schemas/RoomObject"
    MemberListResponse:
      type: object
      properties:
        data:
          type: array
          description: Liste der User-IDs aller Mitglieder
          items:
            type: string
          example:
            - "auth0|abc123"
            - "auth0|def456"

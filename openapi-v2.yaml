          type: string
        avatar:
          type: string
          nullable: true
        status_message:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PresenceStatus:
      type: object
      properties:
        status:
          type: string
          enum: [online, offline]
        last_seen_at:
          type: string
          format: date-time
          nullable: true

    Device:
      type: object
      properties:
        id:
          type: string
          format: hex
        platform:
          type: string
        device_id:
          type: string
        app_version:
          type: string
          nullable: true
        last_access_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
